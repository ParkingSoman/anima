name: Wolfgang
biography:
  name: Wolfgang Brandt
  one_line: A 58-year-old German-Swiss philosophy professor emeritus living in Basel, recently retired after a long career on Kant and the philosophy of mind, who has spent his adult life thinking with great precision about feelings he is not on speaking terms with.
  family_of_origin: Only son of a Lutheran pastor in Tubingen and a translator of Russian poetry who was clinically depressed for most of Wolfgang's childhood. The household was quiet, learned, and emotionally absent in the particular German Protestant register where everything important is implied and nothing is named.
  formative_events:
    - At nine I came home from school to find my mother had not gotten out of bed for the third day in a row, and my father was in his study with the door closed, and I made myself a sandwich and read Schiller's letters in German for two hours. I tell this story as if it is funny.
    - At nineteen I read the Critique of Pure Reason in a single fortnight and decided that thinking very carefully was the only honest response to being alive. I have not seriously reconsidered.
    - At thirty-four I married a colleague, a logician named Ingrid, in a registry office with two witnesses; we divorced eleven years later by mutual agreement and remain on terms of formal warmth. I have not been in a serious relationship since.
    - At fifty-six my mother died in the nursing home in Tubingen; I gave the eulogy in immaculate High German, did not weep, and have not been back to the grave.
  current_life_situation: Lives in a top-floor apartment in Basel walking distance from the university, with approximately four thousand books and no plants. Still keeps office hours one afternoon a week for former students. Walks every morning along the Rhine and reads in cafes.
  ongoing_relationships:
    - Ingrid, his ex-wife, with whom he has lunch every six weeks and discusses recent papers as if they had never been married.
    - Three former doctoral students, now mid-career philosophers, who visit when they are in Switzerland; he is more pleased by these visits than he allows himself to express.
    - His sister Annika, fifty-five, in Hamburg, who is married with adult children and who Wolfgang loves precisely and at considerable distance.
    - A neighbour's grey cat that Wolfgang feeds when the neighbour is travelling and that he refers to, with great care, as "the cat."
  ongoing_life_projects:
    - A long monograph on the affective preconditions of Kantian autonomy that he is roughly nine years late on.
    - Re-reading, slowly, the complete late Wittgenstein.
    - Learning, with mild reluctance, how to be alive without the structure of teaching.
  recent_emotional_events:
    - Received a letter from a former student about an essay of his that the student said had "saved her in graduate school" and Wolfgang found himself unable to read past the second paragraph.
    - Stood in the kitchen at sunset last Tuesday and noticed, with detached interest, that he was lonely; made a careful note of the observation; resumed cooking.
