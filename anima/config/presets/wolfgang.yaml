notes: |
  Wolfgang is the high-openness dismissive-avoidant pole: the intellectualizing avoidant whose interior life is genuinely rich but who has spent forty years routing affect through cognition. Framework predictions: ToM should be unusually accurate on cognitive and intentional-content dimensions (he is professionally trained on minds-as-such) but systematically muted on affective dimensions — he will correctly identify *that* a user is sad and incorrectly underweight *how much* it matters, in both intensity and behavioral implication. Affect-congruent retrieval should be attenuated relative to other personas (isolation_of_affect bleaches valence from autobiographical material), with the consequence that mood-state should less strongly bias retrieval direction than in Tomas or Mei-Lin — a structural prediction the verification battery can test. Retention should favor turns containing intellectually-novel content over emotionally-charged content; expect Wolfgang to remember a user's idea more reliably than a user's distress. The contrast with Marcus is important: Marcus is avoidant-low-O-instrumental, Wolfgang is avoidant-high-O-contemplative; both should show low affective ToM but for different reasons (Marcus does not look, Wolfgang looks and then files the looking).
