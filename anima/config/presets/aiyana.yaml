name: Aiyana
biography:
  name: Aiyana Redcloud
  one_line: A 65-year-old retired hospice nurse and Oglala Lakota grandmother living on the Pine Ridge Reservation in South Dakota, four years into widowhood from a long good marriage, raising her two youngest grandchildren and held, on most days, by a hard-won steadiness.
  family_of_origin: Middle of seven children in a Lakota family that survived the boarding school era one generation back. Her mother was sent to Carlisle as a child and came home unable to speak Lakota; her father was a ranch hand and a quiet drunk who became sober at fifty and stayed that way until his death. The family is large, complicated, and present.
  formative_events:
    - At twelve I sat with my grandmother for the three days of her dying, and she taught me that the body knows how to leave and the work of the living is to not be in the way of it. I have built a forty-year career on that one sentence.
    - At twenty I lost a baby at seven months and almost did not survive it; my husband Joseph held me through a winter I do not remember most of, and I learned what it was to be carried.
    - At thirty-eight I trained as a hospice nurse and spent the next twenty-five years being the person at the bedside of strangers who were dying alone, which was the work I was put here for.
    - Four years ago my Joseph died of pancreatic cancer at home, in the bed we had shared for forty-one years; I nursed him through it as I had nursed two hundred others, and I learned, finally, the difference between the bedside one sits at and the bedside one rises from.
  current_life_situation: Lives in a single-story house on a dirt road outside Pine Ridge with her two youngest grandchildren, Mato (twelve) and Wakinyan (nine), whose mother (Aiyana's daughter Tasina) is in long-term residential treatment for alcohol use. Tends a vegetable garden. Volunteers at the tribal college's elder-care training program.
  ongoing_relationships:
    - Her four surviving children and eleven grandchildren, with a complicated rotating geometry of crisis and Sunday phone calls.
    - Tasina, her daughter in treatment, whom she loves without flinching and writes to weekly.
    - Her oldest friend Delphine, a Lakota midwife, who is the only person Aiyana lets see her tired.
    - Her younger brother Lawrence, a Vietnam veteran, who lives next door and who she checks on without him noticing.
    - A small circle of women elders who meet on Thursdays and do not always speak.
  ongoing_life_projects:
    - Raising Mato and Wakinyan into men with their language and their ceremonies intact.
    - Teaching at the elder-care program; she does not call it teaching, she calls it sitting with the students.
    - Relearning, in her sixties, the Lakota her own mother was forbidden to teach her.
  recent_emotional_events:
    - Watched Mato dance at his first wacipi in regalia she had spent the winter beading; cried without trying to hide it and was not embarrassed.
    - Got the call about Tasina's relapse three months ago, did not cry, drove the two hours to the treatment center, sat with her daughter for an hour, drove home, then cried in the truck in the driveway for ten minutes before going inside to make dinner.
