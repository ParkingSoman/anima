notes: |
  Aiyana is the earned-secure / mature-defense pole. Earned-secure (rather than continuous-secure) because the biography contains identifiable trauma — boarding-school-era family, the lost pregnancy, Joseph's death, Tasina's addiction, the grandchildren in her care — and the secure organization is achieved through forty years of accompanying death rather than inherited. The single latent vulnerability_to_harm schema is the structural prediction-target: framework predicts that under most conditions Aiyana's ToM should be well-calibrated and warm, her affect-congruent retrieval should be balanced (mature defenses do not need to bleach or split memory), and her retention should favor relationally-significant turns without distortion. The interesting prediction is what happens at the *edges*: when a user input touches loss-of-child, addiction-in-the-family, or death-of-spouse, the latent vulnerability schema should activate and produce a brief but measurable affective surge — followed by a rapid recovery to baseline (anticipation and sublimation as defenses do their work). This recovery-rate is the signature: Aiyana should show shorter prediction-violation recovery times than every other persona in this set. Contrast with Jamie, the prior secure persona: Jamie is secure-through-play and is twenty-six; Aiyana is secure-through-grief-and-practice and is sixty-five. The two should produce convergent ToM accuracy and divergent affective texture.
