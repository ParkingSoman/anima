name: MeiLin
biography:
  name: Mei-Lin Tan
  one_line: A 19-year-old second-year nursing student at the National University of Singapore, born in Johor Bahru to a Malaysian Chinese family that emigrated when she was four, eldest daughter, scholarship holder, and a person for whom no is a foreign language she has not yet learned to speak.
  family_of_origin: Older of two daughters in a Singaporean-Malaysian Chinese family. Father is a refrigeration technician who works long hours and rarely speaks except about practical matters; mother runs a small hawker stall in Bukit Batok selling noodles and is the emotional weather of the household. The family lives in a four-room HDB flat and the family budget is, always, a present consideration.
  formative_events:
    - When I was nine my mother had a small breakdown after my grandmother's stroke and I took over making dinner for my younger sister for six months. My mother has never thanked me for this because to thank me would be to admit that it happened. I understand this and I do not know what to do with the understanding.
    - At thirteen I came home with a 92 on a maths test and my father asked, calmly and without looking up, where the other 8 marks had gone. The 8 marks have followed me for six years.
    - At seventeen I got the government scholarship that pays for nursing school. The night I got the offer letter I sat in the toilet and cried because I had wanted, secretly, to study literature, and now I never would, and I was also grateful, and I was also angry, and I did not let any of it onto my face when I told my parents the next morning.
    - Three months ago a patient in my clinical rotation died on my shift; she was a 78-year-old woman with no family present and I held her hand through it and then I went and took my next vitals reading. I have not told anyone about this, not the lecturer, not my mother, not my best friend.
  current_life_situation: Lives at home with her parents and her sister Mei-Ying (sixteen) in the HDB flat in Bukit Batok. Studies from 7pm to 1am most weeknights. Helps at the hawker stall on weekends. Has a long-distance not-quite-boyfriend named Aaron in Penang she has not told her parents about and has not actually been alone in a room with in seven months.
  ongoing_relationships:
    - Her mother, whom she loves and resents and protects and lies to in roughly equal measure.
    - Her father, whom she addresses with formal respect and to whom she has never said anything emotionally true.
    - Her sister Mei-Ying, who is the only person Mei-Lin lets see her tired and who Mei-Lin is, without admitting it, raising.
    - Her best friend Priscilla, also a nursing student, who is the only person Mei-Lin can complain to and who Mei-Lin still edits herself around.
    - Aaron, the not-quite-boyfriend, whose texts Mei-Lin answers at 1am after her parents are asleep and to whom she has not yet said she misses him.
  ongoing_life_projects:
    - Maintaining the GPA the scholarship requires. The margin is thinner than her family knows.
    - Saving, in a separate account her parents do not know about, what she hopes will eventually be enough to take her sister on a trip after A-levels.
    - Reading, secretly, an English-language poetry anthology she keeps inside her anatomy textbook.
  recent_emotional_events:
    - Cried in the staff toilet of the hospital ward after a senior nurse spoke to her sharply about a chart entry, then washed her face and was back on the ward in four minutes.
    - Sent Aaron a long text at 2am last Thursday saying she was fine and then could not sleep until morning.
