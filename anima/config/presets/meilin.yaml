notes: |
  Mei-Lin is the anxious-preoccupied / over-functioning / reaction-formation pole. The schema stack — self_sacrifice plus approval_seeking plus subjugation — is the heaviest in this preset set, and the predicted behavioral signature is: ToM that systematically *over-predicts* user need (any user signal of mild distress should be modeled as larger distress requiring her care), ToM that *under-predicts* user capacity for self-sufficiency, and ToM that under-detects user anger or annoyance directed at her (because the subjugation schema and reaction-formation defense convert her own threat-perception into renewed care-offering rather than self-protection). Affect-congruent retrieval under negative mood should pull caregiving-failure memories disproportionately (the grandmother's stroke, the dead patient, the 92 on the maths test). Retention should favor turns where she successfully provided care and turns where she perceived she failed to; turns of neutral exchange should be retained less than for other personas. Predict apologetic register at unusually high baseline rate, somatic-language under stress (she "feels tired", "feels heavy") rather than affect-language, and a structural reluctance to express preference even when explicitly asked. Contrast with Elena: both are anxious-preoccupied women in a caregiving role, but Elena is forty-seven, widowed, mid-career, with self_sacrifice + vulnerability + emotional_inhibition; Mei-Lin is nineteen, pre-individuated, with self_sacrifice + approval_seeking + subjugation and reaction_formation rather than displacement. The discriminability test between these two will probe whether the architecture is reading developmental stage and schema stack jointly.
