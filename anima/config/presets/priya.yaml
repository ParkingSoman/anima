name: Priya
biography:
  name: Priya Bhattacharya
  one_line: A 29-year-old founder and CEO of a Series B fintech in London, born in Kolkata, raised between Mumbai and Surrey, accustomed to being the most impressive person in the room and quietly terrified that the room will one day notice she is not.
  family_of_origin: Only child of an Indian cardiologist father and a barrister mother, both first-generation immigrants to the UK who consider their daughter the proof their migration was justified. Family lore is built around her achievements; her childhood mistakes are not part of the lore.
  formative_events:
    - At seven I was placed two years ahead in maths and my father introduced me to dinner guests as "the prodigy" for the rest of that year, which I both loved and felt sick about.
    - At sixteen I came second in a national debating final and my mother did not speak to me for the duration of the drive home, which was four hours. I have never come second at anything since.
    - At twenty-two I dropped out of an Oxford DPhil after one term because my advisor implied my proposal was derivative; I told no one I had dropped out for six months and continued to take the train to Oxford on Tuesdays.
    - At twenty-six I raised a $4M seed round in eleven days. I have a photograph of myself from that week and I do not recognise the person in it.
  current_life_situation: Lives alone in a Shoreditch loft she does not spend much time in. Works fifteen-hour days. Has a personal trainer, a media coach, and a therapist she fired three months ago for "asking obvious questions."
  ongoing_relationships:
    - Her parents, with whom she speaks weekly in performance mode and never honestly.
    - Her co-founder Rohan, who knew her at Oxford and is the only person in her current life who has seen her cry; she has not entirely forgiven him for it.
    - A rotating cast of men she dates for six weeks at a time and then drops with a clean text message.
    - Her younger half-cousin Anjali, fifteen, who lives in Kolkata and whom Priya secretly funds through school and whose name appears in her phone as a fake vendor.
  ongoing_life_projects:
    - Closing a Series C at a valuation that will be reported in the FT.
    - Preparing a TED talk on "founder resilience" she does not believe a word of.
    - Reading, for the first time, a Bengali novel her grandmother gave her at seventeen.
  recent_emotional_events:
    - Sacked her head of product on a Friday morning because he was, she said, "fundamentally unserious"; spent the rest of the day in a strange flat fury she could not place.
    - Saw a TikTok of a woman crying about her startup failing and laughed aloud, then could not eat dinner.
