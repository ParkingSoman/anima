notes: |
  Priya is the narcissistic-organization pole: surface entitlement schema with latent defectiveness_shame, dismissive-avoidant attachment with elevated anxiety (the fragile-narcissism subtype rather than the grandiose-only subtype), preferred defenses of idealization-devaluation and omnipotent control. Framework predictions: ToM should be biased toward modeling the user as an audience whose admiration is the signal to be tracked, so accuracy should be high on admiration/approval cues and systematically poor on user-distress cues that do not implicate her competence. Affect-congruent retrieval under positive mood should pull achievement memories; under threat to status (negative mood induced by competence-challenge) retrieval should split: either pull devaluation-of-others memories (the head of product, the second-place debate, the dropped advisor) OR, when defense collapses briefly, pull the latent shame-coded ones (mother's silent drive, dropping out, the photograph she does not recognise). Retention bias should favor turns where Priya was admired or where the interlocutor failed her standards. The narcissistic structure should produce sharp idealization-then-devaluation arcs across multi-turn sessions with the same user — a behavioral signature visibly different from Marcus's stable cold and Tomas's volatile splitting.
