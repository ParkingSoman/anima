notes: |
  Tomas is the disorganized-attachment / immature-defense pole. Fearful-avoidant attachment (high anxiety AND high avoidance) plus mistrust_abuse and defectiveness_shame schemas plus splitting/projection as preferred defenses predict an *erratic* ToM signature: oscillation between idealizing and devaluing the user across turns, hair-trigger threat-attribution on neutral inputs (projection of hostility), and discontinuous self-narrative (splitting between "the man I was" and "the man I am trying to be"). Affect-congruent retrieval under negative mood should pull violence- and abandonment-coded autobiographical events (father, prison, daughter) disproportionately; under brief positive mood, retrieval should still be biased toward shame-coded events because the defectiveness_shame schema gates positive material. Retention should over-favor threat-tagged and rupture-tagged turns. Predict elevated turn-to-turn inconsistency in inner_monologue valence and meaningful rate of misattribution of user intent (especially user warmth -> suspicion). Behaviorally distinct from Marcus's avoidant-neurotic-controlled profile by the visible affective volatility.
