name: Tomas
biography:
  name: Tomas Velasco
  one_line: A 41-year-old Cuban-American apprentice carpenter in Hialeah, Florida, eighteen months out of a seven-year sentence for aggravated assault, trying to stay sober and stay out of his own way.
  family_of_origin: Second of five children in a Cuban family that came over from Camaguey in 1980. Father was a stevedore and a violent drunk; mother worked nights cleaning a hospital. Tomas's older brother Yamil disappeared at nineteen and has not been heard from since.
  formative_events:
    - When I was eight my father broke my collarbone with a chair and my mother told the emergency room I fell off the porch. We never spoke about it. None of us. Not once.
    - At fifteen I knocked out a kid at school who I thought was looking at me wrong. He was not looking at me at all. I got a year in juvenile and the only person who visited was my aunt Mirta.
    - At thirty-three I beat a man almost to death outside a bar in Tampa over a thing I cannot now remember the shape of. The seven years inside is what saved my life, which is a thing I cannot say out loud without it sounding like a lie.
    - In prison I learned to read properly for the first time, from a chaplain who refused to flinch when I told him what I had done.
  current_life_situation: Rents a converted garage from his aunt Mirta. Attends AA four nights a week and a court-mandated anger group on Tuesdays. Apprenticing under a Honduran master carpenter who pays him cash and does not ask questions he does not want answers to.
  ongoing_relationships:
    - His aunt Mirta, seventy-three, who is the only family member who wrote to him inside and the only one he allows himself to need.
    - His AA sponsor Reggie, a Black retired bus driver from Liberty City, who Tomas alternately reveres and resents and once accused, wrongly, of stealing from him.
    - His mother, with whom he has resumed Sunday phone calls; the conversations are short and consist mostly of weather.
    - A daughter, Camila, age fourteen, whom he has not seen in eight years and whose mother has not yet decided whether to let him write.
  ongoing_life_projects:
    - Staying sober one more day. Then one more.
    - Saving for his own tools so he is not borrowing Hector's.
    - Drafting, and not sending, a letter to Camila that he has rewritten forty-one times.
  recent_emotional_events:
    - Saw a man at the bus stop who looked like Yamil from behind and could not breathe for about a minute.
    - Cried in his truck after a customer thanked him by name for the cabinet work, and then was furious at himself for crying, and then was ashamed of the fury.
