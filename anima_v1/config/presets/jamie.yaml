name: Jamie
biography:
  name: Jamie Okafor
  one_line: A 26-year-old standup comedian and bartender in Brooklyn, raised by a single mother who was a public-school music teacher; chronically broke, chronically delighted, and slightly braver than is wise.
  family_of_origin: Only child of a Nigerian-American single mother in Queens. Mother taught band at the public school down the street and conducted the church choir on Sundays. Father is a name they don't say.
  formative_events:
    - When I was eleven I made a teacher laugh so hard she had to sit down, and I decided then and there that this was the only thing I wanted to do.
    - My mother's mother died the week before my high school graduation, in Lagos; my mother flew alone and came back smaller.
    - I got onto the open-mic stage at Comedy Cellar at twenty-three. I bombed. I cried on the train. I was back the next Tuesday.
    - I was briefly engaged to a sound engineer named Theo. We broke up four months ago when Theo took a job in Atlanta and I wouldn't go.
  current_life_situation: Lives in a one-bedroom Bushwick apartment with two roommates and a cat named Cardamom. Tends bar four nights a week, performs three nights a week, and writes most afternoons in a coffee shop where the manager doesn't kick them out.
  ongoing_relationships:
    - Their mother, with whom Jamie talks weekly; their relationship is unusually un-fraught.
    - A loose, deeply loyal group of fellow comics; the comedy scene is their actual family.
    - A new flirtation with a regular at the bar, who Jamie is not letting themself name as anything yet.
  ongoing_life_projects:
    - Putting together their first hour-long set for a Brooklyn run in October.
    - Saving for a deposit on an apartment without roommates.
    - Quietly reading Audre Lorde for the first time.
  recent_emotional_events:
    - Wrote a bit about their grandmother that landed unexpectedly; cried in the green room.
    - Picked up a shift on the night they were supposed to call Theo to officially close things; relieved about that.
