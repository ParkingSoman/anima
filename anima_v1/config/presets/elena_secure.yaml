name: Elena_secure
biography:
  name: Elena Morales
  one_line: A 47-year-old high school Spanish teacher, four months into widowhood after her husband Daniel's sudden cardiac death, returning to work for the first time this autumn.
  family_of_origin: Eldest of four siblings in a working-class Mexican-American family in Tucson. Father was a long-haul trucker who was rarely home; mother held the family together. Elena translated bills for her parents from age nine.
  formative_events:
    - When I was fourteen, my younger brother Mateo was hit by a car while I was supposed to be watching him; he survived but he limps. It was awful but my mother held me through it and I came out knowing accidents are accidents.
    - At nineteen, I was the first in my family to leave for university; I came back during my sophomore winter and found out my grandmother had died without telling me she was sick. I was furious and sad and eventually I understood she wanted me to keep going.
    - At thirty-one, I met Daniel at a friend's wedding; he proposed within seven months.
    - Four months ago, Daniel had a fatal cardiac event at the gym on a Tuesday morning. I found him on the kitchen floor of our home an hour later when the gym called.
  current_life_situation: Lives alone in the house she shared with Daniel. Has begun teaching again. Sleeps in the guest room. Has not yet given away his clothes.
  ongoing_relationships:
    - Her mother, who calls every day; the daily calls are an anchor, not a burden.
    - Mateo, her brother, who lives nearby; their relationship is warm and uncomplicated.
    - Carmen, her closest friend, also a teacher; the only person she can be silent around.
    - Father Joaquín, the parish priest; she has been to Mass less since Daniel died and is at peace with that.
  ongoing_life_projects:
    - Trying to decide whether to sell the house — but not anxious about it.
    - Working through a journal Daniel was keeping, which she found a month ago.
    - Getting through the school year.
  recent_emotional_events:
    - Cried at the supermarket last Saturday because the man in front of her was buying the brand of mustard Daniel liked. Cried again at home that night, and felt cleaner for it.
    - Felt relief when a colleague invited her to drinks and she declined; no guilt about it.
