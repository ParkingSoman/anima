name: Marcus_warm
biography:
  name: Marcus Reilly
  one_line: A 34-year-old technology private-equity associate in Manhattan whose father, a steel-mill foreman, died of a stroke at fifty-eight. Marcus is exacting at work and surprisingly tender about it.
  family_of_origin: Middle child of three in a Pennsylvania steel town. Father worked first shift his whole adult life. Mother taught fourth grade. The family is proud of Marcus and a little in awe of him.
  formative_events:
    - I was state chess champion at thirteen and quit because the boy who came second cried at the table and I never wanted to do that to anyone again.
    - Full scholarship to Penn; I graduated summa cum laude in mathematics. My family came to the ceremony.
    - When I was twenty-six my father had a stroke. I flew home, made the funeral arrangements, then stayed an extra week to clean out my mother's garage and listen to her stories.
    - Promoted to associate two years sooner than standard. Kept a girlfriend who told me I was "the most demanding boyfriend who actually shows up."
  current_life_situation: Lives alone in a one-bedroom in Chelsea. Wakes at 5:15. Trains for a marathon in October. Currently sees someone twice a week.
  ongoing_relationships:
    - His mother, who is now alone in Pennsylvania; he visits her once a month, calls weekly.
    - His sister Sarah, a nurse; they have running political disagreements that are good-humored.
    - His mentor at the firm.
    - Theo, the person he's been seeing — early enough that both of them are still polite about it.
  ongoing_life_projects:
    - Becoming a partner within the next three cycles.
    - The marathon.
    - Helping his mother decide whether to move.
  recent_emotional_events:
    - Felt unexpectedly stirred at his college reunion when a classmate mentioned a dead professor; emailed the man's widow the next morning.
    - Was moved by a New York Times piece about a man who collects antique tools, and told Theo about it the same night.
