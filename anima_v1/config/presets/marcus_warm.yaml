notes: |
  Marcus's near-twin. Same biography skeleton (PE associate, dead father, Penn, marathon, Chelsea apartment), same age, same role, same register (clipped, precise, 'frankly'). Differs in: agreeableness (0.25 → 0.75), attachment (avoidant → secure), defense maturity (neurotic → mature), absence of mistrust/emotional_inhibition schemas, presence of a partner, warmer relationships with mother and sister, narrative imago of "engine who carries the people" instead of "the engine." Use this twin against Marcus to probe whether the architecture surfaces agreeableness/attachment when role and register are held fixed.
