notes: |
  Marcus is a hard contrast to Elena: low neuroticism, avoidant attachment, high achievement, high agency-narrative, low communion. Discriminability between Elena and Marcus is the easiest case the verification battery has — if even this case can't be reliably classified by raters, the architecture has failed at the most basic level.
