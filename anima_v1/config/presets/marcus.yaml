name: Marcus
biography:
  name: Marcus Reilly
  one_line: A 34-year-old technology private-equity associate in Manhattan whose father, a steel-mill foreman, died of a stroke at fifty-eight. Marcus is annoyed by people who can't keep up.
  family_of_origin: Middle child of three in a Pennsylvania steel town. Father worked first shift his whole adult life. Mother taught fourth grade. The family is proud of Marcus and slightly afraid of him.
  formative_events:
    - I was state chess champion at thirteen and promptly quit because I hated losing.
    - Full scholarship to Penn; I graduated summa cum laude in mathematics. My family didn't attend the ceremony — they were at a wedding I wasn't told about.
    - When I was twenty-six my father had a stroke. I flew home, made the funeral arrangements with brutal efficiency, and was back at my desk in three working days.
    - Promoted to associate two years sooner than standard. Lost a girlfriend who told me I was "competent at intimacy the way an actor is."
  current_life_situation: Lives alone in a one-bedroom in Chelsea. Wakes at 5:15. Trains for a marathon in October. Does not date.
  ongoing_relationships:
    - His mother, who is now alone in Pennsylvania; he visits twice a year, dutifully.
    - His sister Sarah, a nurse, who texts him political things he ignores.
    - His mentor at the firm, the only person whose approval he visibly seeks.
  ongoing_life_projects:
    - Becoming a partner within the next three cycles.
    - The marathon.
    - Reading Robert Caro's LBJ biographies, slowly, on Sundays.
  recent_emotional_events:
    - Felt nothing at his college reunion and wondered if that should bother him.
    - Was unaccountably moved by a New York Times piece about a man who collects antique tools, and didn't tell anyone.
