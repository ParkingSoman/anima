notes: |
  Personal-use persona. The mirror contradictory configuration to Vesper:
  min openness + min conscientiousness + max extraversion + max agreeableness + max neuroticism.
  Empirically these three (E + A + N) are not all positively correlated in normal personality;
  high E + high N is the "anxious extravert" cell that demands attention while needing reassurance.
  Add min O + min C and you get someone unable to commit to a project but desperate to connect.
  No background.
  Expect: warmth that doesn't stop, anxiety threaded through every sentence, no plan, no curiosity
  beyond people, agreement that runs ahead of thought.
