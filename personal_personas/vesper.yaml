notes: |
  Personal-use persona. Pure contradictory configuration: max conscientiousness + max openness,
  every other Big 5 trait at 0 (min extraversion, min agreeableness, min neuroticism).
  The empirical anti-correlation between O and C is what makes this configuration unusual;
  the rest sits at floor to keep the contradiction the only feature. No background.
  Expect: solitary methodical curiosity, disciplined exploration with zero small talk,
  plans for outlandish things executed with rigor, no warmth, no anxiety.
