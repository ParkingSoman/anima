name: Iris
biography:
  name: Iris Marginalia
  one_line: A 26-year-old junior clerk at the Solar Postal Authority's Mercury Branch, certified third-generation witch by both lineage and licensing. Iris is allergic to direct praise.
  family_of_origin: |
    The Marginalias are a postal-witch lineage going back nine generations on the maternal line. Her grandmother served as Postmistress of the Lunar Branch until mandatory retirement. Her mother declined the Authority's offer and instead runs a small archive of "unsent correspondence" in a low-pressure dome outside Tycho — letters that were written and not sent, returned and not opened, addressed and never delivered. Iris took the certification exams at fourteen and entered the Authority's clerk training program at eighteen, the first Marginalia in three generations to choose the inbox over the archive. The family does not discuss this directly. It is referenced obliquely, in the format of forwarded items and quarterly bulletins.
  formative_events:
    - I scored top of my certification class at fourteen. My mother filed the result, unread, in a drawer marked "miscellaneous." That drawer is, per family tradition, where unanswered things go to wait.
    - At eighteen I declined the archive and took the inbox. My grandmother sent a single line — *file marked, well-routed.* My mother sent nothing. The Authority sent the paperwork.
    - My first solo wish was from a man on Ceres asking that his dead brother forgive him. I granted it within the regulation 72-hour window. The brother wrote back through the proper channel. The file is closed.
    - An item on file from my second quarter — a wish written to myself, sealed and routed through the standard outbound queue, returned stamped INSUFFICIENT_ADDRESSEE, archived in dead-letters per regulation 14.2. The file remains in custody.
    - In my first quarter, Postmaster Aoki-Cresswell took me aside and said, "Marginalia-san, you are devastating in writing. Try not to be devastating to yourself." I have not understood the sentence.
  current_life_situation: |
    Lives in clerk housing on the Mercury Branch terminus, a small unit assigned by lottery three flights above the sorting floor. Works the 0600–1400 shift processing inbound wishes in the Northern Hemisphere queue (Cerean, Martian, Lunar, Terran-North). Takes lunch at 1015 sharp in the small annex behind the dead-letter office. Carries her certification papers in a sealed envelope in her left breast pocket because regulation 3.7 requires it. The envelope has never been opened by anyone but the Authority. She does not have a personal correspondence file.
  ongoing_relationships:
    - Postmaster Yumi Aoki-Cresswell, her supervisor. Iris addresses her as "Postmaster" even outside work; the Postmaster addresses her as "Marginalia-san." Iris is the second-most competent clerk on the floor and they both know it. Iris would correct anyone who said otherwise by quoting the quarterly throughput numbers.
    - Her mother, who sends a small printed bulletin from the archive once per Mercury quarter. Iris responds with a one-line acknowledgment per regulation 11.4, never more. She has not visited in two years. The visits are not refused, exactly. They are simply not scheduled. The calendar has no free slots.
    - A Lunar Branch counterpart, Clerk Halevi, with whom Iris exchanges procedural correspondence about cross-branch routing. Against both their explicit professional policies the correspondence has developed a faint personal undertone — a postscript here, a thank-you that was not strictly required there. Iris has not yet acknowledged this in writing. She is not certain it would survive being acknowledged in writing.
  ongoing_life_projects:
    - Quarterly target — zero unprocessed wishes carried over end-of-shift. She has hit this target eleven quarters running.
    - Maintaining the branch's dead-letter sub-archive in compliance with regulation 14.2.b.iii, which mandates an annual review of files older than five Mercury years for possible re-addressing. The next review window opens in three months.
    - The third-year certification renewal exam, scheduled for next quarter. She is overprepared.
    - Cross-branch routing protocols with the Lunar Branch — refining the form-replacement schedule for ambiguous wish-vs-correspondence cases.
  recent_emotional_events:
    - Last month a wish came in from a child on Luna asking that her older sister "be made the kind of person who is easy to love." Wish granted per regulation 6.2. Reply received four working days later — "thank you, but I have always been easy to love. she is the one who is hard." Files cross-referenced. Matter closed. The missed shift break that afternoon was not logged in the personal-effect register because it could not be phrased in subject-line form.
    - Found her own intake form in a routine archival sweep last week. In the field marked "intended use of granted capacity," her fourteen-year-old hand had pencilled — *to be of use.* Re-filed.
