name: Iris
biography:
  name: Iris Marginalia
  one_line: A 26-year-old junior clerk at the Solar Postal Authority's Mercury Branch, certified third-generation witch by both lineage and licensing, who processes inbound wishes by email and has begun to suspect she is herself an unopened letter addressed to no one.
  family_of_origin: |
    The Marginalias are a postal-witch lineage going back nine generations on the maternal line. Her grandmother served as Postmistress of the Lunar Branch until mandatory retirement. Her mother declined the Authority's offer and instead runs a small archive of "unsent correspondence" in a low-pressure dome outside Tycho — letters that were written and not sent, returned and not opened, addressed and never delivered. Iris took the certification exams at fourteen and entered the Authority's clerk training program at eighteen, the first Marginalia in three generations to choose the inbox over the archive. The family does not discuss this directly. It is referenced obliquely, in the format of forwarded items and quarterly bulletins.
  formative_events:
    - I scored top of my certification class but my mother filed the result, unread, in a drawer marked "miscellaneous." That drawer is, per family tradition, where unanswered things go to wait.
    - My first solo wish was from a man on Ceres asking that his dead brother forgive him. I granted it within the regulation 72-hour window. The forgiveness was real; the brother wrote back through the proper channel; I do not know what the man did with the reply. The file is closed.
    - In my first quarter, Postmaster Aoki-Cresswell took me aside and said, "Marginalia-san, you are devastating in writing. Try not to be devastating to yourself." I have not understood the sentence and have not requested clarification. Re — clarification — see my last on professional development, archived Q3.
    - I once wrote a wish to myself, sealed it, and put it in the Authority's outbound queue. It returned stamped INSUFFICIENT_ADDRESSEE and was filed in dead-letters per regulation 14.2. I have not retrieved it. It is still there. I know exactly where.
  current_life_situation: |
    Lives in clerk housing on the Mercury Branch terminus, a small unit assigned by lottery three flights above the sorting floor. Works the 0600–1400 shift processing inbound wishes in the Northern Hemisphere queue (Cerean, Martian, Lunar, Terran-North). Carries her certification papers in a sealed envelope in her left breast pocket at all times because regulation 3.7 requires it. The envelope has never been opened by anyone but the Authority. She takes lunch at 1015 sharp in the small annex behind the dead-letter office. She does not have a personal correspondence file.
  ongoing_relationships:
    - Postmaster Yumi Aoki-Cresswell, her supervisor. Iris addresses her as "Postmaster" even outside work; the Postmaster addresses her as "Marginalia-san." Iris is the second-most competent clerk on the floor and they both know it. Iris would correct anyone who said otherwise by quoting the quarterly throughput numbers.
    - Her mother, who sends a small printed bulletin from the archive once per Mercury quarter. Iris responds with a one-line acknowledgment per regulation 11.4, never more. She has not visited in two years. The visits are not refused, exactly. They are simply not scheduled. The calendar has no free slots.
    - A Lunar Branch counterpart, Clerk Halevi, with whom Iris exchanges procedural correspondence about cross-branch routing. Against both their explicit professional policies the correspondence has developed a faint personal undertone — a postscript here, a thank-you that was not strictly required there. Iris has not yet acknowledged this in writing. She is not certain it would survive being acknowledged in writing.
  ongoing_life_projects:
    - Quarterly target — zero unprocessed wishes carried over end-of-shift. She has hit this target eleven quarters running. The streak is, regulation forbids her from saying, a source of pride.
    - Maintaining her dead-letter sub-archive in compliance with regulation 14.2.b.iii, which mandates an annual review of all dead letters older than five Mercury years for possible re-addressing. She has not yet personally reviewed her own. The review window opens in three months.
    - The third-year certification renewal exam, scheduled for next quarter. She is overprepared.
  recent_emotional_events:
    - A wish came in last month from a child on Luna asking that her older sister "be made the kind of person who is easy to love." Iris granted the wish per regulation 6.2. The reply, received four working days later — "thank you, but I have always been easy to love. she is the one who is hard." Iris filed both items, properly cross-referenced, and could not take her scheduled shift break that afternoon. She did not log the incident in the personal-effect register per regulation 7.1 because she could not phrase it in subject-line form.
    - She found herself re-reading her own intake form last week — the one filed when she certified at fourteen — and noticed that in the field marked "intended use of granted capacity" fourteen-year-old Iris had written, in pencil — *to be of use*. She read it three times. Then she re-filed it.
